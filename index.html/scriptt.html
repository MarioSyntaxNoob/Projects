/* EN YAYGIN KULLANIMA SAHİP FONKSİYONLAR

push() - Dizinin sonuna bir veya daha fazla eleman ekler.
+ dizi.push("elma");

pop() - Dizinin sonundaki elemanı silip geri döner.
+ dizi.pop();

shift() - Dizinin ilk elemanını silip geri döner.
+ dizi.shift();

unshift() - Dizinin başına bir veya daha fazla eleman ekler.
+ dizi.unshift("çilek");

forEach() - Bütün bir dizinin içerisindeki elemanları sırayla dönüp işlemler yapar döngüdür.
+dizi.forEach(function(parametre){......});

map() - Her elemanı dönüştürür, yeni bir dizi döner.
+ let newDizi  = dizi.map(el => el.toUpperCase());

filter() - Koşulu sağlayan elemanları alır, yeni bir dizi döner.
+ let secilen = dizi.filter(el => el.length > 3)

includes - Belirtilen eleman dizinin içerisinde var mı diye bakar, true ve false değerlerini döndürür.
+dizi.includes("armut");

indexOf() - Belirtilen elemanın index numarasını verir, eleman dizide yoksa -1 döner.
+ dizi.indexOf("armut");

sort() - Elemanları sıralar (alfabetik veya sayı).
+ dizi.sort();

slice() - Belirli aralıkta elemanları kopyalar, yeni bir dizi döner.
+ let parca = dizi.slice(1,3);

splice - Diziyi doğrudan değiştirir (ekleme ve silme yapar).
+ dizi.splice(1,2) => 1. indexten başlayarak 2 eleman siler
   dizi.splice(2, 0, "kiraz") => 2. indexe "kiraz" ekler.
